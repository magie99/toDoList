<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
</head>
<body>
    <div id="sidebar">
        <h3>my todo list</h3>
        <ul id="project-list">
            <li>default</li>
        </ul>
    </div>
    <div id="project-container">
        <div id="project-header">
            <h3 id="projec-title">default</h3>
            <button command="show-modal" commandfor="addToDo-dialog">add to do</button>
            <dialog id="addToDo-dialog">
                <form id="addToDoForm">
                    <label for="title">Title</label>
                    <input type="text" name="title" id="title" value="title" required>
                    <label for="description">description</label>
                    <input type="text" name="description" id="description" value="description" required>
                    <label for="dueDate">Due Date</label>
                    <input type="date" name="dueDate" id="dueDate">
                    <label for="priority">Priority</label>
                    <input type="number" name="priority" id="priority" value="5">
                    <button type="submit" id="submitBtn">submit</button>
                    <button type="button" id="cancelBtn">cancel</button>
                 </form>
            </dialog>
        </div>
        <div id="to-do-container"></div>
    </div>
</body>
</html>
